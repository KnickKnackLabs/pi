name: KKL Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Fork release tag, e.g. v0.79.0-kkl.1"
        required: true
        type: string
      source_ref:
        description: "Source ref to release (defaults to main)"
        required: false
        type: string
        default: main

permissions: {}

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag }}
      SOURCE_REF: ${{ github.event.inputs.source_ref || 'main' }}
    steps:
      - name: Validate tag shape
        run: |
          case "$RELEASE_TAG" in
            v*-kkl.*) ;;
            *)
              echo "RELEASE_TAG must look like vX.Y.Z-kkl.N" >&2
              exit 1
              ;;
          esac

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.SOURCE_REF }}
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.10

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22
          cache: npm

      - name: Verify package version matches tag
        run: |
          expected="${RELEASE_TAG#v}"
          actual="$(node -p "require('./packages/coding-agent/package.json').version")"
          if [ "$actual" != "$expected" ]; then
            echo "packages/coding-agent version $actual does not match $expected" >&2
            exit 1
          fi

      - name: Build binaries
        run: ./scripts/build-binaries.sh

      - name: Create release notes
        run: |
          cat > /tmp/release-notes.md <<EOF
          KKL fork release ${RELEASE_TAG}.

          Based on upstream Pi ${RELEASE_TAG%%-kkl.*} with KnickKnackLabs fork patches.
          EOF

      - name: Create GitHub Release and upload binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          target="$(git rev-parse HEAD)"
          cd packages/coding-agent/binaries

          release_assets=(
            pi-darwin-arm64.tar.gz
            pi-darwin-x64.tar.gz
            pi-linux-x64.tar.gz
            pi-linux-arm64.tar.gz
            pi-windows-x64.zip
            pi-windows-arm64.zip
          )
          sha256sum "${release_assets[@]}" > SHA256SUMS
          release_assets+=(SHA256SUMS)

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --target "$target" \
              --title "${RELEASE_TAG}" \
              --notes-file /tmp/release-notes.md
            gh release upload "${RELEASE_TAG}" "${release_assets[@]}" --clobber
          else
            gh release create "${RELEASE_TAG}" \
              --target "$target" \
              --title "${RELEASE_TAG}" \
              --notes-file /tmp/release-notes.md \
              "${release_assets[@]}"
          fi
